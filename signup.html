<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Loyalty Program</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .container { width: 100%; max-width: 400px; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .biz-name { font-size: 26px; font-weight: 700; color: #FFD700; margin-bottom: 6px; }
    .tagline { font-size: 14px; color: #555; }
    .card { background: #111; border: 0.5px solid #222; border-radius: 20px; padding: 28px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 600; color: #FFD700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input { padding: 14px 16px; background: #0a0a0a; border: 0.5px solid #222; border-radius: 10px; font-size: 15px; color: #fff; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .field input:focus { border-color: #FFD700; }
    .field input::placeholder { color: #333; }
    .btn { width: 100%; padding: 15px; background: #FFD700; color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .btn:hover { background: #FFC800; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .wallet-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .wallet-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .apple-btn { background: #fff; color: #000; }
    .apple-btn:hover { background: #f0f0f0; }
    .google-btn { background: #1a73e8; color: #fff; }
    .google-btn:hover { background: #1557b0; }
    .divider { text-align: center; font-size: 12px; color: #333; margin: 16px 0; }
    .success-card { display: none; text-align: center; background: #111; border: 0.5px solid #222; border-radius: 20px; padding: 40px 28px; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 700; color: #FFD700; margin-bottom: 8px; }
    .success-msg { font-size: 14px; color: #555; line-height: 1.6; }
    .desktop-qr { text-align: center; padding: 20px; }
    .desktop-qr p { font-size: 13px; color: #555; margin-bottom: 16px; }
    .source-badge { display: inline-block; font-size: 11px; color: #333; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; margin-bottom: 24px; }
    .consent { font-size: 11px; color: #333; margin-top: 12px; line-height: 1.5; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <div class="biz-name" id="bizName">Loading...</div>
    <div class="tagline">Join our loyalty program — it's free</div>
    <div class="source-badge" id="sourceBadge" style="display:none"></div>
  </div>

  <!-- SIGN UP FORM -->
  <div class="card" id="formCard">
    <div class="card-title">Create your loyalty card</div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="+1 234 567 8900" autocomplete="tel">
    </div>
    <div class="field">
      <label>Email <span style="color:#333;font-weight:400">(optional)</span></label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
    </div>
    <button class="btn" id="submitBtn" onclick="handleSignup()">Get My Loyalty Card</button>
    <p class="consent">By signing up you agree to receive loyalty updates from this business via SMS.</p>
  </div>

  <!-- WALLET BUTTONS (shown after form submit) -->
  <div class="card" id="walletCard" style="display:none">
    <div class="card-title">Add to your wallet</div>
    <div class="wallet-btns" id="walletBtns"></div>
  </div>

  <!-- SUCCESS -->
  <div class="success-card" id="successCard">
    <div class="success-icon">🎉</div>
    <div class="success-title">You're in!</div>
    <div class="success-msg" id="successMsg">Your loyalty card has been added to your wallet.</div>
  </div>
</div>

<script>
  const slug = window.location.pathname.split('/c/')[1] || 'default';
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src') || 'direct';
  const locId = params.get('loc') || '';

  // Detect device
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);
  const isMobile = isIOS || isAndroid;

  // Show source badge
  const srcLabels = { qr: '📷 Scanned QR code', ig: '📱 Instagram', staff: '🧑‍💼 Staff assisted', promo: '🎁 Promo offer', ref: '👥 Referral', direct: '🔗 Direct link' };
  if(src !== 'direct') {
    const badge = document.getElementById('sourceBadge');
    badge.textContent = srcLabels[src] || src;
    badge.style.display = 'inline-block';
  }

  // Load merchant info from slug
  let merchantData = null;
  async function loadMerchant() {
    try {
      const res = await fetch(`/merchant/slug/${slug}`);
      const data = await res.json();
      if(data.success) {
        merchantData = data.merchant;
        document.getElementById('bizName').textContent = data.merchant.businessName;
        document.title = `Join ${data.merchant.businessName}`;
      } else {
        document.getElementById('bizName').textContent = 'Loyalty Program';
      }
    } catch(e) {
      document.getElementById('bizName').textContent = 'Loyalty Program';
    }
  }
  loadMerchant();

  async function handleSignup() {
    const name = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();
    const email = document.getElementById('emailInput').value.trim();

    if(!name) return alert('Please enter your name.');
    if(!phone) return alert('Please enter your phone number.');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating your card...';

    try {
      const res = await fetch('/register/stampcard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name, phone, email,
          businessName: merchantData?.businessName || slug,
          merchantId: merchantData?.id || slug,
          src, locId,
          walletType: isAndroid ? 'google' : 'apple'
        })
      });
      const data = await res.json();

      if(data.success) {
        document.getElementById('formCard').style.display = 'none';
        showWalletOptions(data.walletUrl);
      } else {
        alert('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Get My Loyalty Card';
      }
    } catch(e) {
      alert('Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Get My Loyalty Card';
    }
  }

  function showWalletOptions(walletUrl) {
    const walletCard = document.getElementById('walletCard');
    const walletBtns = document.getElementById('walletBtns');
    walletCard.style.display = 'block';

    if(isIOS) {
      walletBtns.innerHTML = `
        <button class="wallet-btn apple-btn" onclick="window.location.href='${walletUrl}'">
          🍎 Add to Apple Wallet
        </button>`;
    } else if(isAndroid) {
      walletBtns.innerHTML = `
        <button class="wallet-btn google-btn" onclick="window.location.href='${walletUrl}'">
          ★ Add to Google Wallet
        </button>`;
    } else {
      // Desktop — show both options
      walletBtns.innerHTML = `
        <p style="font-size:13px;color:#555;margin-bottom:12px">Scan with your phone or choose your wallet:</p>
        <button class="wallet-btn apple-btn" onclick="window.location.href='${walletUrl}'">
          🍎 Add to Apple Wallet
        </button>
        <button class="wallet-btn google-btn" onclick="window.location.href='/card/google?id=${walletUrl}'">
          ★ Add to Google Wallet
        </button>`;
    }
  }
</script>
</body>
</html>
