<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WalletPass — Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{background:#111;border:1px solid #FFD700;border-radius:16px;padding:40px;width:100%;max-width:400px}
    .card h1{color:#FFD700;font-size:24px;margin-bottom:8px;text-align:center;font-weight:700}
    .card p{color:#555;font-size:13px;text-align:center;margin-bottom:32px}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .fg label{font-size:13px;color:#aaa;font-weight:500}
    .fg input{padding:12px;border:1px solid #333;border-radius:8px;font-size:14px;outline:none;background:#222;color:#fff;font-family:inherit}
    .fg input:focus{border-color:#FFD700}
    .btn{width:100%;padding:14px;background:#FFD700;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
    .btn:hover{background:#FFC800}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .err{color:#ff4444;font-size:13px;text-align:center;margin-top:12px}
    .signup-link{text-align:center;font-size:13px;color:#555;margin-top:16px}
    .signup-link a{color:#FFD700;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h1>WalletPass</h1>
    <p>Sign in to manage your loyalty cards</p>

    <div class="fg">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com"/>
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn" id="loginBtn">Sign In</button>
    <p class="err" id="errorMsg"></p>
    <div class="signup-link">Don't have an account? <a href="/signup">Sign up here</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMOR53eRC_eafMewxKuiDRFSyzMyil5f0",
      authDomain: "walletpass-admin.firebaseapp.com",
      projectId: "walletpass-admin",
      storageBucket: "walletpass-admin.firebasestorage.app",
      messagingSenderId: "643004300341",
      appId: "1:643004300341:web:4080b5a008d72d145e857c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').addEventListener('click', async function(){
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      if(!email || !password){
        errMsg.textContent = 'Please fill in all fields!';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errMsg.textContent = '';

      try{
        await signInWithEmailAndPassword(auth, email, password);

        const res = await fetch('/auth/check-merchant', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if(data.isMerchant){
          localStorage.setItem('merchantId', data.merchant.id);
          localStorage.setItem('merchantBizName', data.merchant.businessName);
          localStorage.setItem('merchantCardType', data.merchant.cardType || 'stamp');
          window.location.href = '/merchant-dashboard';
        }
      } catch(error){
        errMsg.textContent = 'Invalid email or password!';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
