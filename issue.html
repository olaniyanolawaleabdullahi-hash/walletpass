<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WalletPass — Issue Card</title>
  <style>

.preview-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .preview-modal.show { display: flex; }
    .preview-inner {
      background: #000;
      border: 0.5px solid #FFD700;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 360px;
      position: relative;
    }
    .preview-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
    }
    .wallet-card {
      background: #000;
      border: 0.5px solid #FFD700;
      border-radius: 12px;
      padding: 20px;
      margin-top: 10px;
    }
    .wallet-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .wallet-business { font-size: 11px; color: #FFD700; text-transform: uppercase; letter-spacing: 0.08em; }
    .wallet-points { font-size: 22px; font-weight: 700; color: #FFD700; }
    .wallet-points-label { font-size: 10px; color: #555; }
    .wallet-name { font-size: 16px; font-weight: 500; color: #fff; margin-bottom: 12px; }
    .wallet-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .wallet-field-label { font-size: 10px; color: #555; margin-bottom: 2px; }
    .wallet-field-value { font-size: 12px; color: #ccc; }
    .wallet-qr {
      width: 60px; height: 60px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #000;
      text-align: center;
      margin-top: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #000; border-right: 0.5px solid #222; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform 0.3s; }
    .sidebar-logo { padding: 24px 20px; border-bottom: 0.5px solid #1a1a1a; }
    .sidebar-logo h1 { font-size: 18px; color: #FFD700; font-weight: 700; }
    .sidebar-logo p { font-size: 11px; color: #444; margin-top: 2px; }
    .sidebar-nav { padding: 16px 10px; flex: 1; }
    .nav-item { padding: 10px 14px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s; display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-item:hover { background: #1a1a1a; color: #fff; }
    .nav-item.active { background: #FFD700; color: #000; font-weight: 500; }
    .sidebar-footer { padding: 16px 20px; border-top: 0.5px solid #1a1a1a; font-size: 11px; color: #333; }
    .main { margin-left: 220px; flex: 1; padding: 24px; min-height: 100vh; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar h2 { font-size: 20px; color: #FFD700; font-weight: 500; }
    .staff-badge { font-size: 12px; color: #555; background: #1a1a1a; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #222; }
    .hamburger { display: none; background: none; border: none; color: #FFD700; font-size: 22px; cursor: pointer; }
    .card { background: #000; border: 0.5px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 14px; font-weight: 500; color: #FFD700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 0.5px solid #1a1a1a; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: #555; }
    .form-group input, .form-group select { padding: 10px 12px; background: #111; border: 0.5px solid #333; border-radius: 8px; font-size: 13px; color: #fff; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #FFD700; }
    .form-group select option { background: #111; }
    .btn-primary { padding: 10px 24px; background: #FFD700; color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { background: #FFC800; }
    .share-box { display: none; margin-top: 16px; padding: 16px; background: #111; border: 0.5px solid #222; border-radius: 10px; }
    .share-box p { font-size: 12px; color: #555; margin-bottom: 10px; }
    .share-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .share-btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .share-link { font-size: 11px; color: #444; margin-top: 8px; word-break: break-all; }
    .msg { font-size: 13px; margin-top: 10px; }
    .msg.success { color: #4CAF50; }
    .msg.error { color: #ff4444; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .overlay.show { display: block; }
      .main { margin-left: 0; padding: 16px; }
      .hamburger { display: block; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>WalletPass</h1>
      <p>Admin Panel</p>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/">Dashboard</a>
      <a class="nav-item active" href="/issue">Issue Card</a>
      <a class="nav-item" href="/members-page">Members</a>
    </nav>
    <div class="sidebar-footer">WalletPass v1.0</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <h2>Issue New Card</h2>
      </div>
<span class="staff-badge">Welcome, Staff</span>
<button onclick="logout()" style="padding:6px 14px;background:#2a0000;color:#ff4444;border:0.5px solid #ff4444;border-radius:20px;font-size:12px;cursor:pointer;">Logout</button>    </div>

    <div class="card">
      <div class="card-title">Card Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Customer Name</label>
          <input type="text" id="customerName" placeholder="e.g. John Adeyemi" />
        </div>
        <div class="form-group">
          <label>Member ID</label>
<input type="text" id="memberId" placeholder="Auto-generated..." readonly style="opacity:0.6;cursor:not-allowed;" />        </div>
        <div class="form-group">
          <label>Points</label>
          <input type="number" id="points" placeholder="e.g. 500" />
        </div>
        <div class="form-group">
          <label>Loyalty Status</label>
          <select id="loyaltyStatus">
            <option value="Bronze Member">Bronze Member</option>
            <option value="Silver Member">Silver Member</option>
            <option value="Gold Member">Gold Member</option>
          </select>
        </div>
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="text" id="expiryDate" placeholder="e.g. 12/2026" />
        </div>
        <div class="form-group">
          <label>Business Name</label>
          <input type="text" id="businessName" placeholder="e.g. LoyaltyPass Co." />
        </div>
      </div>
<button class="btn-primary" onclick="previewCard()" style="margin-right:10px;">Preview Card</button>
<button class="btn-primary" onclick="issueCard()" style="background:#1a1a1a;color:#FFD700;border:0.5px solid #FFD700;">Issue Card</button>      <p class="msg" id="issueMessage"></p>

      <div class="share-box" id="shareOptions">
        <p>Share card with customer:</p>
        <div class="share-btns">
          <button class="share-btn" style="background:#25D366;color:#fff;" onclick="shareWhatsApp()">WhatsApp</button>
          <button class="share-btn" style="background:#0072C6;color:#fff;" onclick="shareEmail()">Email</button>
          <button class="share-btn" style="background:#1a1a1a;color:#fff;border:0.5px solid #333;" onclick="copyLink()">Copy Link</button>
        </div>
        <p class="share-link" id="cardLink"></p>
      </div>
    </div>
  </div>

  <script>

function previewCard() {
      const name = document.getElementById('customerName').value;
      const points = document.getElementById('points').value;
      const status = document.getElementById('loyaltyStatus').value;
      const expiry = document.getElementById('expiryDate').value;
      const business = document.getElementById('businessName').value;

      if (!name || !points || !status || !expiry || !business) {
        showToast('Please fill in all fields first!', 'error');
        return;
      }

      document.getElementById('prev-business').textContent = business;
      document.getElementById('prev-name').textContent = name;
      document.getElementById('prev-points').textContent = parseInt(points).toLocaleString();
      document.getElementById('prev-status').textContent = status;
      document.getElementById('prev-expiry').textContent = expiry;
      document.getElementById('previewModal').classList.add('show');
    }

    function closePreview() {
      document.getElementById('previewModal').classList.remove('show');
    }

    function logout() {
  if (confirm('Are you sure you want to logout?')) {
    window.location.href = '/login';
  }
}
    let currentMemberId = '';
let currentMemberName = '';

async function generateMemberId() {
  try {
    const response = await fetch('/members');
    const members = await response.json();
    const nextNumber = String(members.length + 1).padStart(3, '0');
    document.getElementById('memberId').value = `MEMBER${nextNumber}`;
  } catch (error) {
    document.getElementById('memberId').value = `MEMBER001`;
  }
}

generateMemberId();

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    async function issueCard() {
      const name = document.getElementById('customerName').value;
      const memberId = document.getElementById('memberId').value;
      const points = document.getElementById('points').value;
      const loyaltyStatus = document.getElementById('loyaltyStatus').value;
      const expiryDate = document.getElementById('expiryDate').value;
      const businessName = document.getElementById('businessName').value;

      if (!name || !memberId || !points || !expiryDate || !businessName) {
        document.getElementById('issueMessage').className = 'msg error';
        document.getElementById('issueMessage').textContent = 'Please fill in all fields!';
        return;
      }

      try {
        const response = await fetch('/members/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, memberId, points: parseInt(points), loyaltyStatus, expiryDate, businessName })
        });
        const result = await response.json();
        if (result.success) {
          currentMemberId = memberId;
          currentMemberName = name;
          document.getElementById('issueMessage').className = 'msg success';
          document.getElementById('issueMessage').textContent = `Card issued successfully for ${name}!`;
          document.getElementById('shareOptions').style.display = 'block';
          document.getElementById('cardLink').textContent = `Card link: https://walletpass-dp2j.onrender.com/card/google?id=${memberId}`;
          document.getElementById('customerName').value = '';
          document.getElementById('memberId').value = '';
          document.getElementById('points').value = '';
          document.getElementById('expiryDate').value = '';
          document.getElementById('businessName').value = '';
        }
      } catch (error) {
        document.getElementById('issueMessage').className = 'msg error';
        document.getElementById('issueMessage').textContent = 'Error issuing card!';
      }
    }

    function shareWhatsApp() {
      const link = `https://walletpass-dp2j.onrender.com/card/google?id=${currentMemberId}`;
      const message = `Hi ${currentMemberName}! Your loyalty card is ready. Click the link to add it to your Google Wallet: ${link}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }

    function shareEmail() {
      const link = `https://walletpass-dp2j.onrender.com/card/google?id=${currentMemberId}`;
      const subject = `Your Loyalty Card is Ready!`;
      const body = `Hi ${currentMemberName}!\n\nYour loyalty card is ready:\n\n${link}\n\nThank you!`;
      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function copyLink() {
      const link = `https://walletpass-dp2j.onrender.com/card/google?id=${currentMemberId}`;
      navigator.clipboard.writeText(link);
      document.getElementById('cardLink').textContent = 'Link copied! ' + link;
    }
  </script>
  <div class="preview-modal" id="previewModal">
    <div class="preview-inner">
      <button class="preview-close" onclick="closePreview()">✕</button>
      <p style="font-size:13px;color:#555;margin-bottom:10px;">Card Preview</p>
      <div class="wallet-card">
        <div class="wallet-card-top">
          <div>
            <div class="wallet-business" id="prev-business"></div>
            <div class="wallet-name" id="prev-name"></div>
          </div>
          <div style="text-align:right;">
            <div class="wallet-points-label">POINTS</div>
            <div class="wallet-points" id="prev-points"></div>
          </div>
        </div>
        <div class="wallet-row">
          <div>
            <div class="wallet-field-label">STATUS</div>
            <div class="wallet-field-value" id="prev-status"></div>
          </div>
          <div>
            <div class="wallet-field-label">EXPIRES</div>
            <div class="wallet-field-value" id="prev-expiry"></div>
          </div>
        </div>
        <div class="wallet-qr">QR CODE</div>
      </div>
      <button class="btn-primary" onclick="closePreview(); issueCard();" style="width:100%;margin-top:16px;">Looks Good — Issue Card</button>
    </div>
  </div>
</body>
</html>
